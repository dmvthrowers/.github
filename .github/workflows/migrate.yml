name: Migrate

on:
  push:
    branches: [main]
    paths:
      # Only trigger when migrations or config change.
      - 'yoyomap/supabase/migrations/**'
      - 'yoyomap/supabase/config.toml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print SQL without applying (--dry-run)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  # Only one migration run at a time to avoid races.
  group: migrate
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Apply migrations
        working-directory: yoyomap
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            supabase db push \
              --project-ref ${{ vars.SUPABASE_PROJECT_REF }} \
              --dry-run
          else
            supabase db push \
              --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
          fi
